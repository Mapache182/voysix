name: CI/CD

on:
  push:
    tags:
      - 'worker-*'
      - 'app-*'

jobs:
  # --- JOB 1: Сборка и пуш Docker образа для Worker ---
  build-worker:
    if: startsWith(github.ref, 'refs/tags/worker-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voysix-worker
          tags: |
            type=match,pattern=worker-(.*),group=1
            type=sha,format=short

      - name: Build and push Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/worker-')
        with:
          name: "Worker Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 2: Сборка .exe для приложения (Windows) ---
  build-app:
    if: startsWith(github.ref, 'refs/tags/app-')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем CPU-версию torch для ускорения сборки и уменьшения размера
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r App/requirements.txt

      - name: Build and Package App
        working-directory: ./App
        shell: bash
        run: |
          # Extract version from tag (e.g., app-4.4.52 -> 4.4.52)
          VERSION=${GITHUB_REF_NAME#app-}
          echo "Building version: $VERSION"
          python build_dist.py $VERSION

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: App/dist/Voysix_Setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
