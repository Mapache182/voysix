name: CI/CD

on:
  push:
    tags:
      - 'worker-*'
      - 'app-*'

jobs:
  # --- JOB 1: Сборка и пуш Docker образа для Worker ---
  build-worker:
    if: startsWith(github.ref, 'refs/tags/worker-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voysix-worker
          tags: |
            type=match,pattern=worker-(.*),group=1
            type=sha,format=short

      - name: Build and push Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/worker-')
        with:
          name: "Worker Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 2: Сборка .exe для приложения (Windows) ---
  build-app-windows:
    if: startsWith(github.ref, 'refs/tags/app-')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r App/requirements.txt

      - name: Build and Package App
        working-directory: ./App
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#app-}
          python build_dist.py $VERSION

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: App/dist/Voysix_Setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 3: Сборка .dmg для приложения (macOS) ---
  build-app-macos:
    if: startsWith(github.ref, 'refs/tags/app-')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          brew install create-dmg

      - name: Prepare Icons (.icns)
        run: |
          mkdir icon.iconset
          sips -z 16 16     App/assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     App/assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     App/assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     App/assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   App/assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   App/assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   App/assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   App/assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   App/assets/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 App/assets/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset
          cp icon.icns App/assets/icon.icns

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Remove Windows-only packages from requirements
          sed -i '' '/winshell/d; /pywin32/d; /pycaw/d; /comtypes/d' App/requirements.txt
          pip install torch torchaudio
          pip install -r App/requirements.txt

      - name: Build and Package App (.app)
        working-directory: ./App
        run: |
          VERSION=${GITHUB_REF_NAME#app-}
          python build_macos.py $VERSION

      - name: Create DMG
        working-directory: ./App
        run: |
          mkdir -p dist
          # List build directory to see where cx_Freeze put the app (for debugging)
          ls -R build
          
          APP_PATH=$(find build -name "Voysix.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Voysix.app not found in build directory!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          create-dmg \
            --volname "Voysix Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Voysix.app" 150 190 \
            --hide-extension "Voysix.app" \
            --app-drop-link 450 185 \
            "dist/Voysix_macOS.dmg" \
            "$APP_PATH"

      - name: Upload macOS Asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: App/dist/Voysix_macOS.dmg
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
